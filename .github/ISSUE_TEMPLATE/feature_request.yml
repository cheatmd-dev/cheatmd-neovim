name: Feature request
description: Suggest an improvement for cheatmd.nvim.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow should be easier?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should the plugin do?
    validations:
      required: true
